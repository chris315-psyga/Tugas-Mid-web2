<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="h-screen w-full bg-[url('/images/ghibli-studio-totoro-aesthetic-desktop-wallpaper-4k.jpg')] bg-cover bg-no-repeat bg-contain bg-fixed">
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container main-content mt-4">

        <h1 class="text-[35px] text-gray-200 font-light drop-shadow-md mb-10 max-w-2xl text-left" th:text="${title}">Judul</h1>

        <!-- Search Form -->
        <form th:action="@{/products/search}" method="get" class= "w-full max-w-2xl mx-auto grid grid-cols-[1fr_auto] gap-x-4 items-center mb-4">
            <div class="ml-2 flex-3 relative">
                <input type="text" name="keyword" class="ml-2 w-full bg-white/30 text-white placeholder-gray-200 px-5 py-3 rounded-xl focus:outline-none focus:bg-white/50 transition duration-300" placeholder="Cari produk..." th:value="${keyword}">
            </div>
            <button type="submit" class="mr-2 px-8 py-3 bg-white/30 hover:bg-white/50 text-white font-bold rounded-xl transition duration-300 shadow-sm">Cari</button>
        </form>

        <div class="flex flex-wrap justify-center items-center gap-3 mb-6">
            <span class="text-white font-medium text-lg mr-2 drop-shadow-sm">Filter:</span>
            <a th:href="@{/products}" class="px-6 py-2 rounded-full bg-white/30 hover:bg-white/50 text-white border border-white/40 backdrop-blur-md transition duration-300 shadow-sm font-medium">Semua</a>
            <a th:href="@{/products/category/Elektronik}" class="px-6 py-2 rounded-full bg-white/30 hover:bg-white/50 text-white border border-white/40 backdrop-blur-md transition duration-300 shadow-sm font-medium">Elektronik</a>
            <a th:href="@{/products/category/Buku}" class="px-6 py-2 rounded-full bg-white/30 hover:bg-white/50 text-white border border-white/40 backdrop-blur-md transition duration-300 shadow-sm font-medium">Buku</a>
            <a th:href="@{/products/category/Makanan}" class="px-6 py-2 rounded-full bg-white/30 hover:bg-white/50 text-white border border-white/40 backdrop-blur-md transition duration-300 shadow-sm font-medium">Makanan</a>
        </div>

        <p class="text-[25px] text-gray-200 font-light drop-shadow-md mb-5 max-w-2xl text-left">
            Menampilkan <strong th:text="${totalProducts}">0</strong> produk
        </p>

        <!-- Tabel Produk -->
        <div class="w-full overflow-hidden rounded-2xl shadow-2xl bg-white/10 border border-white/40">
            <table class="w-full text-left border-collapse">
                <thead class="bg-black/60 text-white">
                <tr>
                    <th class="px-6 py-3 text-xs font-bold uppercase tracking-wider">No</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase tracking-wider">Nama Produk</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase tracking-wider">Kategori</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase tracking-wider">Harga</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase tracking-wider">Stok</th>
                    <th class="px-6 py-3 text-xs font-bold uppercase tracking-wider">Aksi</th>
                </tr>
                </thead>

                <tbody class="divide-y divide-gray-200">
                <tr th:each="product, iterStat : ${products}" class="even:bg-blue-50/50 hover:bg-blue-100/60 transition duration-200">
                    <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${iterStat.count}">1</td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-900" th:text="${product.name}">Nama</td>
                    <td class="px-6 py-4 text-sm">
                        <a th:href="@{/products/category/{cat}(cat=${product.category})}"
                           th:text="${product.category}"
                           class="text-blue-600 hover:text-blue-800 font-semibold hover:underline">Kategori</a>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-700" th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                        Rp 0
                    </td>
                    <td class="px-6 py-4 text-sm">
                    <span th:text="${product.stock}" th:class="${product.stock < 20 ? 'text-red-600 font-bold' : 'text-green-600'}">0</span>
                    </td>
                    <td class="px-6 py-4 text-sm">
                        <a th:href="@{/products/{id}(id=${product.id})}"
                           class="inline-block px-4 py-2 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700 transition shadow-sm">
                            Detail
                        </a>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pesan kosong -->
        <div th:if="${products.isEmpty()}" class="alert alert-warning">
            Tidak ada produk yang ditemukan.
        </div>

    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
</div>

</body>
</html>
